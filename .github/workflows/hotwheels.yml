name: Hot Wheels MRP Watcher

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hotwheels-watcher-run
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python hotwheels_bot.py

      - name: Commit updated seen.json (avoids duplicate alerts)
        run: |
          git config user.name "hotwheels-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json
          git diff --quiet --cached || git commit -m "Update seen listings [skip ci]"
          git pull --rebase origin main
          git push
